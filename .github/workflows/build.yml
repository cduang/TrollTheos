name: Build TrollTheos TIPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-tipa:
    name: Build UnjailTheos.tipa
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build and package TIPA
        run: |
          chmod +x Scripts/build-tipa.sh
          ./Scripts/build-tipa.sh

      - name: Verify TIPA
        run: |
          test -f dist/UnjailTheos.tipa
          unzip -l dist/UnjailTheos.tipa | head -20
          ls -lh dist/UnjailTheos.tipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnjailTheos-tipa-${{ github.run_number }}
          path: dist/UnjailTheos.tipa
          if-no-files-found: error

      - name: Create Release with TIPA
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tipa-${{ github.run_number }}-${{ github.run_id }}
          name: "UnjailTheos $(date +%Y-%m-%d_%H-%M-%S)"
          body: |
            TrollStore 侧载包（.tipa）

            - Run: #${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - 安装: TrollStore → Install → 选择此 .tipa
          files: dist/UnjailTheos.tipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
