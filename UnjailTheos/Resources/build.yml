name: Build Tweak

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  THEOS: ${{ github.workspace }}/theos
  SDK_NAME: iPhoneOS14.5.sdk
  SDK_VERSION: "14.5"

jobs:
  validate-theos-environment:
    name: Validate Theos Environment
    runs-on: macos-latest
    outputs:
      tweak_path: ${{ steps.project.outputs.path }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos toolchain
        run: |
          set -euo pipefail
          git clone --recursive --depth 1 https://github.com/theos/theos.git "$THEOS"
          mkdir -p "$THEOS/sdks"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/theos/sdks.git /tmp/theos-sdks
          cd /tmp/theos-sdks && git sparse-checkout set "$SDK_NAME"
          cp -a "$SDK_NAME" "$THEOS/sdks/" && rm -rf /tmp/theos-sdks
          echo "$THEOS/bin" >> "$GITHUB_PATH"

      - name: Verify Theos installation
        run: |
          test -f "$THEOS/Makefile" && test -d "$THEOS/sdks/$SDK_NAME"
          echo "Theos 环境验证通过"

      - name: Detect Tweak project path
        id: project
        run: |
          if [ -f "Makefile" ]; then
            echo "path=." >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

  build-tweak:
    name: Build Tweak Package
    needs: validate-theos-environment
    if: needs.validate-theos-environment.outputs.tweak_path != ''
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos toolchain
        run: |
          set -euo pipefail
          git clone --recursive --depth 1 https://github.com/theos/theos.git "$THEOS"
          mkdir -p "$THEOS/sdks"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/theos/sdks.git /tmp/theos-sdks
          cd /tmp/theos-sdks && git sparse-checkout set "$SDK_NAME"
          cp -a "$SDK_NAME" "$THEOS/sdks/" && rm -rf /tmp/theos-sdks
          echo "$THEOS/bin" >> "$GITHUB_PATH"
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"

      - name: Detect architectures
        id: arch
        run: |
          BUILD_ARM64=true
          BUILD_ARM64E=true
          ARCHS_VAL=$(grep -E '^ARCHS\s*[:?]?=' Makefile | head -1 | sed 's/^ARCHS\s*[:?]*=\s*//' || true)
          if [ -n "$ARCHS_VAL" ]; then
            BUILD_ARM64=false
            BUILD_ARM64E=false
            echo "$ARCHS_VAL" | grep -qw "arm64" && BUILD_ARM64=true
            echo "$ARCHS_VAL" | grep -qw "arm64e" && BUILD_ARM64E=true
          fi
          echo "build_arm64=$BUILD_ARM64" >> "$GITHUB_OUTPUT"
          echo "build_arm64e=$BUILD_ARM64E" >> "$GITHUB_OUTPUT"

      - name: Build iphoneos-arm64
        if: steps.arch.outputs.build_arm64 == 'true'
        run: |
          set -euo pipefail
          export PATH="$THEOS/bin:$PATH"
          make clean 2>/dev/null || true
          make package ARCHS=arm64 TARGET=iphone:clang:${SDK_VERSION}:${SDK_VERSION} THEOS_PACKAGE_SCHEME=deb

      - name: Build iphoneos-arm64e
        if: steps.arch.outputs.build_arm64e == 'true'
        run: |
          set -euo pipefail
          export PATH="$THEOS/bin:$PATH"
          make clean 2>/dev/null || true
          make package ARCHS=arm64e TARGET=iphone:clang:${SDK_VERSION}:${SDK_VERSION} \
            THEOS_PACKAGE_SCHEME=rootless DEB_ARCH=iphoneos-arm64e

      - name: Collect .deb packages
        run: |
          mkdir -p dist
          find . -path "*/packages/*.deb" -exec cp -v {} dist/ \;
          ls -lh dist/*.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tweak-packages-${{ github.run_number }}
          path: dist/*.deb
          if-no-files-found: error

      - name: Create timestamped Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_attempt }}-${{ github.run_id }}
          name: "UnjailTheos Build $(date +%Y-%m-%d_%H-%M-%S)"
          files: dist/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
